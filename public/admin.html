<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="img/avukat_logo_2000x2000.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilgin Hukuk Bürosu | Yönetim Paneli</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Quill CSS -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

    <style>
        .admin-container {
            max-width: 800px;
            margin: 100px auto;
            padding: 2rem;
            background: var(--white);
            border-radius: 1rem;
            box-shadow: var(--box-shadow);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 0.5rem;
            font-family: inherit;
        }

        /* Quill Editor Height */
        #editor {
            height: 300px;
            background: white;
        }

        .ql-toolbar {
            background: white;
            border-top-left-radius: 0.5rem;
            border-top-right-radius: 0.5rem;
        }

        .ql-container {
            border-bottom-left-radius: 0.5rem;
            border-bottom-right-radius: 0.5rem;
            font-family: inherit;
            font-size: 1rem;
        }

        .btn-submit {
            background-color: var(--primary-color);
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            background-color: var(--secondary-color);
        }

        #login-section {
            text-align: center;
        }

        #admin-panel {
            display: none;
        }
    </style>
</head>

<body>

    <div class="container admin-container">
        <h2 style="text-align: center; margin-bottom: 2rem;">Yönetim Paneli</h2>

        <div id="login-section">
            <div class="form-group">
                <input type="password" id="admin-password" placeholder="Yönetici Şifresi">
            </div>
            <button id="login-btn" class="btn-submit">Giriş Yap</button>
            <p id="login-error" style="color: red; margin-top: 1rem; display: none;">Hatalı şifre!</p>
        </div>

        <div id="admin-panel">
            <h3>Yeni Makale Ekle</h3>
            <form id="add-article-form">
                <div class="form-group">
                    <label for="title">Başlık</label>
                    <input type="text" id="title" required>
                </div>
                <div class="form-group">
                    <label for="date">Tarih</label>
                    <input type="text" id="date" placeholder="Örn: 17 Şubat 2026" required>
                </div>
                <div class="form-group">
                    <label for="category">Kategori</label>
                    <select id="category" class="form-control"
                        style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 0.5rem;" required>
                        <option value="Genel">Genel</option>
                        <option value="Ceza Hukuku">Ceza Hukuku</option>
                        <option value="Aile Hukuku">Aile Hukuku</option>
                        <option value="İş Hukuku">İş Hukuku</option>
                        <option value="Ticaret Hukuku">Ticaret Hukuku</option>
                        <option value="Gayrimenkul Hukuku">Gayrimenkul Hukuku</option>
                        <option value="İcra ve İflas Hukuku">İcra ve İflas Hukuku</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="editor">İçerik</label>
                    <!-- Create the editor container -->
                    <div id="editor"></div>
                </div>
                <button type="submit" class="btn-submit">Makaleyi Yayınla</button>
            </form>
            <div id="status-message" style="margin-top: 1rem;"></div>
        </div>

        <div id="article-list-section"
            style="display:none; margin-top: 3rem; border-top: 1px solid #ddd; padding-top: 2rem;">
            <h3>Mevcut Makaleler</h3>
            <div id="article-list" style="margin-top: 1rem;">
                <!-- Articles will be loaded here -->
                <p>Makaleler yükleniyor...</p>
            </div>
        </div>
    </div>

    <!-- Quill JS -->
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="js/admin.js"></script>
</body>

</html>
